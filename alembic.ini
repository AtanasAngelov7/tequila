# Alembic configuration for Tequila v2
# Used by both the CLI and the startup auto-migration runner.

[alembic]
# Path to migration scripts — overridden at runtime via app/paths.alembic_dir()
script_location = alembic

# SQLite URL — overridden at runtime by env.py using app/paths.db_path()
sqlalchemy.url = sqlite:///data/tequila.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
